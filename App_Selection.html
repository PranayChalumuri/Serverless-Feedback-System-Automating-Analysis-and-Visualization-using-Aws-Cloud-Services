<!DOCTYPE html>
<html>
<head>
    <title>App Sentiment Dashboard - Select App</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gradient-to-br from-gray-900 to-gray-800 min-h-screen flex items-center justify-center p-6">
    <div class="max-w-md w-full bg-white rounded-2xl shadow-2xl p-8">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-800 mb-2">App Insights Dashboard</h1>
            <p class="text-gray-500">Select an app to view detailed sentiment analysis</p>
        </div>

        <!-- App Selection Form -->
        <div class="space-y-6">
            <!-- Search Input with Datalist (Auto-complete) -->
            <div>
                <label for="app-search" class="block text-sm font-medium text-gray-700 mb-2">
                    Search or enter app name
                </label>
                <input 
                    type="text" 
                    id="app-search" 
                    list="app-list"
                    class="w-full px-4 py-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none transition"
                    placeholder="Type app name..."
                >
                <datalist id="app-list">
                    <option value="Zocdoc">
                    <option value="Samsung Health">
                    <option value="Talkspace">
                    <option value="Google Fit">
                    <option value="Tata 1mg">
                    <option value="Mfine">
                    <option value="MDLIVE">
                    <option value="Teladoc Health">
                    <option value="Huawei Health">
                    <option value="Mi Fit">
                    <option value="LG Health">
                </datalist>
            </div>

            <!-- Or select from grid -->
            <div>
                <p class="text-sm font-medium text-gray-700 mb-3">Or select from popular apps:</p>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="selectApp('Zocdoc')" class="px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-medium text-gray-700 transition">Zocdoc</button>
                    <button onclick="selectApp('Samsung Health')" class="px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-medium text-gray-700 transition">Samsung Health</button>
                    <button onclick="selectApp('Google Fit')" class="px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-medium text-gray-700 transition">Google Fit</button>
                    <button onclick="selectApp('Tata 1mg')" class="px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-medium text-gray-700 transition">Tata 1mg</button>
                    <button onclick="selectApp('Mfine')" class="px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-medium text-gray-700 transition">Mfine</button>
                    <button onclick="selectApp('Talkspace')" class="px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-lg text-sm font-medium text-gray-700 transition">Talkspace</button>
                </div>
            </div>

            <!-- Submit Button -->
            <button 
                onclick="navigateToDashboard()"
                class="w-full bg-gradient-to-r from-blue-600 to-blue-700 hover:from-blue-700 hover:to-blue-800 text-white font-semibold py-3 px-6 rounded-lg transition shadow-lg hover:shadow-xl">
                View Dashboard
            </button>
        </div>

        <!-- Quick Stats -->
        <div class="mt-8 pt-6 border-t border-gray-200">
            <div class="grid grid-cols-3 gap-4 text-center">
                <div>
                    <p class="text-2xl font-bold text-gray-800">11</p>
                    <p class="text-xs text-gray-500">Total Apps</p>
                </div>
                <div>
                    <p class="text-2xl font-bold text-gray-800">4</p>
                    <p class="text-xs text-gray-500">Sentiments</p>
                </div>
                <div>
                    <p class="text-2xl font-bold text-gray-800">Real-time</p>
                    <p class="text-xs text-gray-500">Updates</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        let selectedApp = '';

        function selectApp(appName) {
            selectedApp = appName;
            document.getElementById('app-search').value = appName;
        }

        function navigateToDashboard() {
    const appName = document.getElementById('app-search').value.trim();
    
    if (!appName) {
        alert('Please select or enter an app name');
        return;
    }

    const validApps = [
        'Zocdoc', 'Samsung Health', 'Talkspace', 'Google Fit', 'Tata 1mg',
        'Mfine', 'MDLIVE', 'Teladoc Health', 'Huawei Health', 'Mi Fit', 'LG Health'
    ];

    if (!validApps.includes(appName)) {
        alert('Please select a valid app from the list');
        return;
    }

    // Use the new /dashboard endpoint
    window.location.href = `https://qqainv8x5m.execute-api.ap-south-1.amazonaws.com/dev/dashboard?app=${encodeURIComponent(appName)}`;
    console.log('Navigating to:', `https://qqainv8x5m.execute-api.ap-south-1.amazonaws.com/dev/dashboard?app=${encodeURIComponent(appName)}`);
}
    </script>
</body>
</html>
