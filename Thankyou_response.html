<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Thank You for Your Feedback!</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .thank-you-card {
            transition: all 0.3s ease;
        }
        .thank-you-card:hover {
            transform: scale(1.02);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex items-center justify-center p-6">
    
    <div class="max-w-md w-full">
        <!-- Main Card -->
        <div class="thank-you-card bg-white rounded-2xl shadow-xl overflow-hidden">
            <!-- Decorative Success Header -->
            <div class="bg-gradient-to-r from-green-500 to-green-600 px-8 py-12 text-center">
                <div class="w-24 h-24 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-6 backdrop-blur-lg">
                    <svg class="w-12 h-12 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                <h1 class="text-4xl font-bold text-white mb-3">Thank You! 🎉</h1>
                <p class="text-green-100 text-lg">Your feedback has been received</p>
            </div>

            <!-- Content Section -->
            <div class="px-8 py-10 text-center">
                <!-- Simple Thank You Message -->
                <div class="mb-10">
                    <p class="text-gray-600 text-xl mb-3">We truly appreciate your time and effort.</p>
                </div>

                <!-- Single Action Button -->
                <a href="https://qqainv8x5m.execute-api.ap-south-1.amazonaws.com/dev/" 
                   class="inline-block w-full bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white font-semibold py-4 px-6 rounded-lg transition-all duration-300 transform hover:scale-105 shadow-md hover:shadow-lg">
                    ← Return to Home
                </a>
            </div>
        </div>
    </div>
</body>
</html>
